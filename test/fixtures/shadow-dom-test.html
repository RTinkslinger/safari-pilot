<!DOCTYPE html>
<html>
<head><title>Shadow DOM Test</title></head>
<body>
  <my-component></my-component>
  <script>
    class MyComponent extends HTMLElement {
      constructor() {
        super();
        const shadow = this.attachShadow({ mode: 'closed' });
        shadow.innerHTML = '<button id="shadow-btn">Click Me</button><span id="shadow-text">Hello from Shadow DOM</span>';
        shadow.querySelector('#shadow-btn').addEventListener('click', () => {
          shadow.querySelector('#shadow-text').textContent = 'Clicked!';
        });
      }
    }
    customElements.define('my-component', MyComponent);
  </script>
</body>
</html>
