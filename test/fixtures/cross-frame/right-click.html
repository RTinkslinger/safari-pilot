<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>5A.3 right-click fixture</title></head>
<body>
  <h1>5A.3 right-click fixture</h1>
  <button id="t5a3-target" style="padding: 16px 24px; font-size: 18px;">target</button>
  <pre id="t5a3-readout"></pre>
  <script>
    // Record every relevant mouse event on the target button.
    // Tests read window.__sp_5A3 via safari_evaluate to verify the dispatched
    // event sequence matches the W3C UI Events spec for each button value.
    window.__sp_5A3 = [];
    var btn = document.getElementById('t5a3-target');
    var events = ['mousedown', 'mouseup', 'click', 'auxclick', 'contextmenu'];
    events.forEach(function (ev) {
      btn.addEventListener(ev, function (e) {
        window.__sp_5A3.push({
          type: e.type,
          button: e.button,
          buttons: e.buttons,
          ctrlKey: !!e.ctrlKey,
          shiftKey: !!e.shiftKey,
          altKey: !!e.altKey,
          metaKey: !!e.metaKey,
        });
        // Suppress browser context menu so the test stays scriptable.
        if (e.type === 'contextmenu') e.preventDefault();
      });
    });
    // Helper visible in DevTools for ad-hoc inspection.
    window.__sp_5A3_clear = function () { window.__sp_5A3 = []; };
  </script>
</body>
</html>
