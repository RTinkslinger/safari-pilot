<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Extraction Test Page</title>
  <meta name="description" content="A test page for structured extraction">
  <meta name="keywords" content="test, extraction, safari-pilot">
  <meta name="author" content="Safari Pilot Tests">
  <meta property="og:title" content="OG Test Title">
  <meta property="og:description" content="OG test description">
  <meta property="og:image" content="https://example.com/og-image.png">
  <meta property="og:url" content="https://example.com/test">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Twitter Test Title">
  <meta name="twitter:description" content="Twitter test description">
  <link rel="canonical" href="https://example.com/canonical">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Extraction Test Page",
    "description": "A test page for structured extraction"
  }
  </script>
</head>
<body>
  <!-- Smart scrape targets: label→input pairs -->
  <form id="contact-form">
    <label for="name-input">Name</label>
    <input id="name-input" type="text" value="John Doe">
    <label for="email-input">Email</label>
    <input id="email-input" type="email" value="john@example.com">
  </form>

  <!-- Smart scrape targets: heading→content pairs -->
  <article>
    <h2>Price</h2>
    <p>$49.99</p>
    <h2>Description</h2>
    <p>This is the product description text.</p>
  </article>

  <!-- Table for extract_tables tests -->
  <table id="products-table">
    <thead>
      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Stock</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Widget A</td>
        <td>$10.00</td>
        <td>50</td>
      </tr>
      <tr>
        <td>Widget B</td>
        <td>$20.00</td>
        <td>30</td>
      </tr>
    </tbody>
  </table>

  <!-- Links for extract_links tests -->
  <nav>
    <h3>Navigation</h3>
    <a href="/about">About Us</a>
    <a href="/products">Products</a>
    <a href="https://external.example.com/blog">External Blog</a>
    <a href="https://another-domain.com/page">Another External</a>
  </nav>

  <p>Read our <a href="/docs/guide">documentation guide</a> for more info.</p>

  <!-- Images for extract_images tests -->
  <section id="gallery">
    <img src="https://example.com/hero.jpg" alt="Hero image" width="800" height="400">
    <img src="https://example.com/thumb.jpg" alt="Thumbnail" width="100" height="100">
    <img src="https://example.com/icon.png" alt="Icon" width="16" height="16">
  </section>
</body>
</html>
