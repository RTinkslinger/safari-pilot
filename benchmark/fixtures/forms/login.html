<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safari Pilot Fixture — Login</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 400px; margin: 4rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 1.5rem; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    input { display: block; width: 100%; margin-top: 0.25rem; padding: 0.5rem; font-size: 1rem; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { display: block; margin-top: 1.5rem; padding: 0.6rem 1.5rem; font-size: 1rem; background: #0070f3; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #005ec2; }
    #result { margin-top: 1.5rem; padding: 0.75rem 1rem; border-radius: 4px; display: none; }
    #result.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
  </style>
</head>
<body>
  <h1>Login</h1>
  <form id="login-form">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" placeholder="Enter username">

    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter password">

    <button type="submit">Log In</button>
  </form>
  <div id="result" role="alert"></div>

  <script>
    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const result = document.getElementById('result');
      result.className = 'success';
      result.style.display = 'block';
      result.textContent = 'Form submitted — login successful for user: ' + username;
    });
  </script>
</body>
</html>
