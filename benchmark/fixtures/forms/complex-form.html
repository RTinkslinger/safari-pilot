<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safari Pilot Fixture — Complex Form</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 4rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 1.5rem; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    input, select { display: block; width: 100%; margin-top: 0.25rem; padding: 0.5rem; font-size: 1rem; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    .checkbox-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; }
    .checkbox-row input { width: auto; display: inline; }
    .checkbox-row label { margin: 0; font-weight: normal; }
    button { display: block; margin-top: 1.5rem; padding: 0.6rem 1.5rem; font-size: 1rem; background: #0070f3; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #005ec2; }
    #result { margin-top: 1.5rem; padding: 0.75rem 1rem; border-radius: 4px; display: none; }
    #result.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
  </style>
</head>
<body>
  <h1>Registration Form</h1>
  <form id="complex-form">
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" placeholder="Enter your name">

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" placeholder="you@example.com">

    <label for="country">Country</label>
    <select id="country" name="country">
      <option value="">— Select a country —</option>
      <option value="us">United States</option>
      <option value="uk">United Kingdom</option>
      <option value="jp">Japan</option>
    </select>

    <div class="checkbox-row">
      <input type="checkbox" id="terms" name="terms">
      <label for="terms">I agree to the terms and conditions</label>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="newsletter" name="newsletter">
      <label for="newsletter">Subscribe to newsletter</label>
    </div>

    <button type="submit">Submit</button>
  </form>
  <div id="result" role="alert"></div>

  <script>
    document.getElementById('complex-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const country = document.getElementById('country');
      const selectedText = country.options[country.selectedIndex].text;
      const result = document.getElementById('result');
      result.className = 'success';
      result.style.display = 'block';
      result.textContent = 'Form submitted successfully. Country selected: ' + selectedText;
    });
  </script>
</body>
</html>
