<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safari Pilot Fixture — Browser Engine Table</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 4rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f5f5f5; font-weight: 600; }
    th, td { padding: 0.6rem 0.75rem; text-align: left; border: 1px solid #ddd; }
    tr:nth-child(even) td { background: #fafafa; }
  </style>
</head>
<body>
  <h1>Browser Engines</h1>
  <table id="engines-table">
    <thead>
      <tr>
        <th>Browser Engine</th>
        <th>Browser</th>
        <th>Initial Release Year</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>WebKit</td>
        <td>Safari</td>
        <td>2003</td>
      </tr>
      <tr>
        <td>Blink</td>
        <td>Chrome</td>
        <td>2013</td>
      </tr>
      <tr>
        <td>Gecko</td>
        <td>Firefox</td>
        <td>2004</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
