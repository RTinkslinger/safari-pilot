<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safari Pilot Fixture — Data Table</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 4rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f5f5f5; font-weight: 600; }
    th, td { padding: 0.6rem 0.75rem; text-align: left; border: 1px solid #ddd; }
    tr:nth-child(even) td { background: #fafafa; }
  </style>
</head>
<body>
  <h1>Programming Languages</h1>
  <table id="data-table">
    <thead>
      <tr>
        <th>Language</th>
        <th>Year Created</th>
        <th>Primary Use</th>
        <th>Typing</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Python</td>
        <td>1991</td>
        <td>General purpose, data science</td>
        <td>Dynamic</td>
      </tr>
      <tr>
        <td>JavaScript</td>
        <td>1995</td>
        <td>Web front-end and back-end</td>
        <td>Dynamic</td>
      </tr>
      <tr>
        <td>Rust</td>
        <td>2010</td>
        <td>Systems programming</td>
        <td>Static</td>
      </tr>
      <tr>
        <td>TypeScript</td>
        <td>2012</td>
        <td>Typed JavaScript superset</td>
        <td>Static</td>
      </tr>
      <tr>
        <td>Go</td>
        <td>2009</td>
        <td>Cloud infrastructure</td>
        <td>Static</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
