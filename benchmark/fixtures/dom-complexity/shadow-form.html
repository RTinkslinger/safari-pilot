<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shadow DOM Form Fixture</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; }
    #result { margin-top: 1rem; font-weight: bold; color: green; min-height: 1.5rem; }
  </style>
</head>
<body>
  <h1>Shadow DOM Form Fixture</h1>
  <p>A form lives inside a shadow root. Find it, fill it, and submit it.</p>

  <div id="form-host"></div>
  <div id="result"></div>

  <script>
    const host = document.getElementById('form-host');
    const shadow = host.attachShadow({ mode: 'open' });

    shadow.innerHTML = `
      <style>
        form { display: flex; flex-direction: column; gap: 0.75rem; max-width: 300px; }
        label { font-weight: bold; }
        input { padding: 0.4rem; font-size: 1rem; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
      </style>
      <form id="shadow-form">
        <label for="shadow-name">Name</label>
        <input id="shadow-name" name="name" type="text" placeholder="Enter your name" required>
        <button id="shadow-submit" type="submit">Submit</button>
      </form>
    `;

    shadow.getElementById('shadow-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const nameVal = shadow.getElementById('shadow-name').value.trim();
      document.getElementById('result').textContent =
        nameVal
          ? `Form submitted from shadow DOM — name: "${nameVal}"`
          : 'Form submitted from shadow DOM (no name provided)';
    });
  </script>
</body>
</html>
