name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build, Sign, Notarize, and Release
    runs-on: macos-15
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build Swift daemon (arm64)
        run: swift build -c release --arch arm64
        working-directory: daemon

      - name: Build Swift daemon (x86_64)
        run: swift build -c release --arch x86_64
        working-directory: daemon

      - name: Create universal binary with lipo
        run: |
          mkdir -p dist-bin
          lipo -create \
            daemon/.build/arm64-apple-macosx/release/SafariPilotd \
            daemon/.build/x86_64-apple-macosx/release/SafariPilotd \
            -output dist-bin/SafariPilotd
          chmod +x dist-bin/SafariPilotd

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$(mktemp -d)/build.keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$DEVELOPER_ID_CERT_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" -P "$DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"

      - name: Sign universal binary
        env:
          DEVELOPER_ID_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
        run: |
          codesign --force --options runtime \
            --sign "$DEVELOPER_ID_IDENTITY" \
            dist-bin/SafariPilotd

      - name: Notarize binary
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent dist-bin/SafariPilotd dist-bin/SafariPilotd.zip
          xcrun notarytool submit dist-bin/SafariPilotd.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple dist-bin/SafariPilotd || true

      - name: Create release archive
        run: |
          tar -czf SafariPilotd-${{ github.ref_name }}-universal.tar.gz \
            -C dist-bin SafariPilotd
          cp SafariPilotd-${{ github.ref_name }}-universal.tar.gz SafariPilotd-universal.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SafariPilotd-${{ github.ref_name }}-universal.tar.gz
            SafariPilotd-universal.tar.gz
            bin/Safari Pilot.zip
          generate_release_notes: true

      - name: Copy universal daemon binary into bin/ for npm publish
        # Without this, npm publish packages bin/SafariPilotd as populated by
        # `npm ci`'s postinstall — an arm64-only build from the CI runner. Intel
        # Mac users installing via npm would receive a binary that won't run.
        # The universal binary in dist-bin/ is already signed + notarized.
        run: |
          cp dist-bin/SafariPilotd bin/SafariPilotd
          chmod +x bin/SafariPilotd

      - name: Verify bin/SafariPilotd is a universal Mach-O binary
        # Fail-fast guard: if dist-bin wasn't built correctly or the copy above
        # broke, we must NOT publish an arm64-only (or x86_64-only) tarball.
        run: |
          file_output=$(file bin/SafariPilotd)
          echo "$file_output"
          echo "$file_output" | grep -q "Mach-O universal binary" \
            || { echo "ERROR: bin/SafariPilotd is not a universal binary — refusing to publish" >&2; exit 1; }
          echo "$file_output" | grep -q "2 architectures" \
            || { echo "ERROR: bin/SafariPilotd does not contain 2 architectures — refusing to publish" >&2; exit 1; }

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
