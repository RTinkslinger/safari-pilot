name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build, Sign, Notarize, and Release
    runs-on: macos-15
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build Swift daemon (arm64)
        run: swift build -c release --arch arm64
        working-directory: daemon

      - name: Build Swift daemon (x86_64)
        run: swift build -c release --arch x86_64
        working-directory: daemon

      - name: Create universal binary with lipo
        run: |
          mkdir -p dist-bin
          lipo -create \
            daemon/.build/arm64-apple-macosx/release/SafariPilotd \
            daemon/.build/x86_64-apple-macosx/release/SafariPilotd \
            -output dist-bin/SafariPilotd
          chmod +x dist-bin/SafariPilotd

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$(mktemp -d)/build.keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$DEVELOPER_ID_CERT_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" -P "$DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"

      - name: Sign universal binary
        env:
          DEVELOPER_ID_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
        run: |
          codesign --force --options runtime \
            --sign "$DEVELOPER_ID_IDENTITY" \
            dist-bin/SafariPilotd

      - name: Notarize binary
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent dist-bin/SafariPilotd dist-bin/SafariPilotd.zip
          xcrun notarytool submit dist-bin/SafariPilotd.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple dist-bin/SafariPilotd || true

      - name: Create release archive
        run: |
          tar -czf SafariPilotd-${{ github.ref_name }}-universal.tar.gz \
            -C dist-bin SafariPilotd
          cp SafariPilotd-${{ github.ref_name }}-universal.tar.gz SafariPilotd-universal.tar.gz

      # T47 — extension build is pre-built locally and committed to bin/
      # (Xcode project generation requires the full macOS dev environment, so
      # it cannot be rebuilt in CI per CLAUDE.md). But CI MUST verify the
      # code-signature and required entitlements before uploading. Per the
      # v0.1.1–v0.1.3 disaster: every release that ships a broken extension
      # (missing app-sandbox, missing network.client, stripped entitlements
      # from a manual codesign) wastes hours of debugging in production.
      # Fail-fast here = problem stays local.
      - name: Verify extension signature + entitlements (T47)
        run: |
          set -euo pipefail
          if [ ! -f "bin/Safari Pilot.zip" ]; then
            echo "ERROR: bin/Safari Pilot.zip missing — cannot release" >&2
            exit 1
          fi
          EXT_TMP=$(mktemp -d)
          unzip -q "bin/Safari Pilot.zip" -d "$EXT_TMP"
          APP_PATH=$(find "$EXT_TMP" -maxdepth 2 -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: no .app found inside bin/Safari Pilot.zip" >&2
            exit 1
          fi
          APPEX_PATH=$(find "$APP_PATH/Contents/PlugIns" -maxdepth 1 -name "*.appex" -type d 2>/dev/null | head -1)
          if [ -z "$APPEX_PATH" ]; then
            echo "ERROR: no .appex found inside $APP_PATH/Contents/PlugIns" >&2
            exit 1
          fi
          echo "App:   $APP_PATH"
          echo "Appex: $APPEX_PATH"

          echo "=== Verify app signature ==="
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          echo "=== Verify appex signature ==="
          codesign --verify --deep --strict --verbose=2 "$APPEX_PATH"

          echo "=== App entitlements ==="
          APP_ENT=$(codesign -d --entitlements :- "$APP_PATH" 2>/dev/null || true)
          echo "$APP_ENT"
          echo "$APP_ENT" | grep -q "com.apple.security.app-sandbox" \
            || { echo "ERROR: app missing app-sandbox entitlement" >&2; exit 1; }

          echo "=== Appex entitlements ==="
          APPEX_ENT=$(codesign -d --entitlements :- "$APPEX_PATH" 2>/dev/null || true)
          echo "$APPEX_ENT"
          echo "$APPEX_ENT" | grep -q "com.apple.security.app-sandbox" \
            || { echo "ERROR: appex missing app-sandbox entitlement" >&2; exit 1; }
          echo "$APPEX_ENT" | grep -q "com.apple.security.network.client" \
            || { echo "ERROR: appex missing network.client entitlement" >&2; exit 1; }

          echo "=== Stapler validation ==="
          xcrun stapler validate "$APP_PATH" \
            || { echo "ERROR: app notarization ticket invalid or missing" >&2; exit 1; }

          rm -rf "$EXT_TMP"
          echo "Extension verification: OK"

      # T47 — verify the daemon binary's signature is intact. notarytool above
      # fails on submission error, but stapler runs with `|| true` (line 86)
      # which would mask a missing ticket. spctl is the authoritative check
      # for whether Gatekeeper would accept the binary on a user's machine.
      - name: Verify daemon binary signature + notarization (T47)
        run: |
          set -euo pipefail
          codesign --verify --strict --verbose=2 dist-bin/SafariPilotd
          # `xcrun stapler validate` returns non-zero for a CLI-only binary
          # without a stapled ticket attached. Notarized CLI tools may rely
          # on online ticket lookup instead, so we don't hard-fail here —
          # but we do log so a regression is visible in CI output.
          xcrun stapler validate dist-bin/SafariPilotd \
            && echo "Daemon notarization ticket: stapled" \
            || echo "Daemon notarization ticket: not stapled (online verification on user machine)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SafariPilotd-${{ github.ref_name }}-universal.tar.gz
            SafariPilotd-universal.tar.gz
            bin/Safari Pilot.zip
          generate_release_notes: true

      - name: Copy universal daemon binary into bin/ for npm publish
        # Without this, npm publish packages bin/SafariPilotd as populated by
        # `npm ci`'s postinstall — an arm64-only build from the CI runner. Intel
        # Mac users installing via npm would receive a binary that won't run.
        # The universal binary in dist-bin/ is already signed + notarized.
        run: |
          cp dist-bin/SafariPilotd bin/SafariPilotd
          chmod +x bin/SafariPilotd

      - name: Verify bin/SafariPilotd is a universal Mach-O binary
        # Fail-fast guard: if dist-bin wasn't built correctly or the copy above
        # broke, we must NOT publish an arm64-only (or x86_64-only) tarball.
        run: |
          file_output=$(file bin/SafariPilotd)
          echo "$file_output"
          echo "$file_output" | grep -q "Mach-O universal binary" \
            || { echo "ERROR: bin/SafariPilotd is not a universal binary — refusing to publish" >&2; exit 1; }
          echo "$file_output" | grep -q "2 architectures" \
            || { echo "ERROR: bin/SafariPilotd does not contain 2 architectures — refusing to publish" >&2; exit 1; }

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
